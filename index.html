<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>Live Ride Tracker · Real-time Distance & Map</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #000000;
            min-height: 100vh;
            color: #ffffff;
        }

        /* Main Container */
        .app-container {
            max-width: 100%;
            margin: 0 auto;
        }

        /* Map Full Width */
        .map-full {
            width: 100%;
            height: 55vh;
            position: relative;
        }

        #map {
            width: 100%;
            height: 100%;
            background: #1a1a2e;
        }

        /* Overlay Cards */
        .info-overlay {
            position: absolute;
            top: 60px;
            left: 12px;
            right: 12px;
            z-index: 10;
            pointer-events: none;
        }

        .distance-card {
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(20px);
            border-radius: 60px;
            padding: 16px 24px;
            text-align: center;
            border: 1px solid #00ff88;
            box-shadow: 0 8px 32px rgba(0, 255, 136, 0.2);
            pointer-events: auto;
        }

        .distance-value {
            font-size: 2.2rem;
            font-weight: bold;
            color: #00ff88;
            font-family: monospace;
        }

        .distance-label {
            font-size: 0.7rem;
            opacity: 0.7;
            letter-spacing: 1px;
        }

        /* Bottom Panel */
        .bottom-panel {
            background: #0a0e1a;
            border-radius: 32px 32px 0 0;
            padding: 20px;
            margin-top: -20px;
            position: relative;
            z-index: 20;
            box-shadow: 0 -8px 32px rgba(0, 0, 0, 0.5);
        }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            background: #141a2a;
            padding: 6px;
            border-radius: 60px;
        }

        .tab {
            flex: 1;
            text-align: center;
            padding: 12px;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            color: #888;
        }

        .tab.active {
            background: linear-gradient(135deg, #00ff88, #00ccff);
            color: #000;
        }

        /* Code Section */
        .code-section {
            background: #141a2a;
            border-radius: 28px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .code-display {
            background: #000000;
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            border: 2px solid #00ff88;
        }

        .code-number {
            font-size: 2.5rem;
            font-family: monospace;
            letter-spacing: 8px;
            font-weight: bold;
            color: #00ff88;
        }

        .copy-btn {
            background: #00ff88;
            color: #000;
            border: none;
            padding: 10px 24px;
            border-radius: 40px;
            font-weight: bold;
            margin-top: 12px;
            cursor: pointer;
        }

        /* Input Group */
        .input-group {
            display: flex;
            gap: 12px;
            margin-top: 15px;
        }

        .input-group input {
            flex: 1;
            background: #000000;
            border: 1px solid #00ccff;
            padding: 16px;
            border-radius: 60px;
            color: white;
            font-size: 1.3rem;
            text-align: center;
            letter-spacing: 4px;
            font-family: monospace;
        }

        .track-btn {
            background: linear-gradient(135deg, #00ff88, #00ccff);
            border: none;
            padding: 16px 28px;
            border-radius: 60px;
            color: #000;
            font-weight: bold;
            cursor: pointer;
        }

        /* Status */
        .status-card {
            background: #141a2a;
            border-radius: 24px;
            padding: 16px;
            margin-top: 15px;
        }

        .status-row {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .status-dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #555;
        }

        .status-dot.live {
            background: #00ff88;
            box-shadow: 0 0 10px #00ff88;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.8); }
        }

        .location-text {
            font-size: 0.7rem;
            color: #aaaaff;
            margin-top: 8px;
            word-break: break-all;
        }

        .btn-stop {
            background: #ff4444;
            width: 100%;
            padding: 14px;
            border-radius: 60px;
            border: none;
            color: white;
            font-weight: bold;
            margin-top: 15px;
            cursor: pointer;
        }

        .footer {
            text-align: center;
            font-size: 0.6rem;
            opacity: 0.4;
            padding: 16px;
        }

        /* Ride Style Animation */
        .ride-badge {
            display: inline-block;
            background: #00ff8822;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            margin-left: 10px;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Map Section -->
        <div class="map-full">
            <div id="map"></div>
        </div>

        <!-- Distance Overlay -->
        <div class="info-overlay">
            <div class="distance-card" id="distanceCard" style="display: none;">
                <div class="distance-label">🚗 DISTANCE BETWEEN DEVICES</div>
                <div class="distance-value" id="distanceValue">0 m</div>
                <div class="distance-label">🟢 Green line = Live Path</div>
            </div>
        </div>

        <!-- Bottom Panel -->
        <div class="bottom-panel">
            <div class="tabs">
                <div class="tab active" data-tab="share">📱 Share My Phone</div>
                <div class="tab" data-tab="track">🎯 Track Other Phone</div>
            </div>

            <!-- Share Tab (User A - Jo apna phone share karega) -->
            <div id="shareTab">
                <div class="code-section">
                    <div class="code-display">
                        <div style="font-size: 0.7rem; opacity: 0.7;">YOUR UNIQUE RIDE CODE</div>
                        <div class="code-number" id="myCode">------</div>
                        <button class="copy-btn" id="copyCodeBtn">📋 Copy Code</button>
                    </div>
                    <div class="status-card" style="margin-top: 15px;">
                        <div class="status-row">
                            <div class="status-dot" id="shareDot"></div>
                            <span id="shareStatus">📍 Not sharing</span>
                            <span class="ride-badge" id="shareRideBadge" style="display: none;">🚗 LIVE RIDE ACTIVE</span>
                        </div>
                        <div class="location-text" id="shareLocation">-</div>
                    </div>
                    <button class="btn-stop" id="stopShareBtn" style="display: none;">🛑 Stop Sharing My Location</button>
                    <button class="btn-stop" id="startShareBtn" style="background: #00ff88; color: #000; margin-top: 0;">▶ Start Sharing Location</button>
                </div>
            </div>

            <!-- Track Tab (User B - Jo doosre phone ko track karega) -->
            <div id="trackTab" style="display: none;">
                <div class="code-section">
                    <div class="input-group">
                        <input type="text" id="targetCode" placeholder="Enter 6-digit code" maxlength="6">
                        <button class="track-btn" id="trackBtn">🔍 Start Tracking</button>
                    </div>
                    <div class="status-card">
                        <div class="status-row">
                            <div class="status-dot" id="trackDot"></div>
                            <span id="trackStatus">Waiting for code</span>
                        </div>
                        <div class="location-text" id="trackLocation">-</div>
                    </div>
                    <button class="btn-stop" id="stopTrackBtn" style="display: none;">⛔ Stop Tracking</button>
                </div>
            </div>

            <div class="footer">
                🟢 Green = Target Phone | 🔵 Blue = Your Phone | 🟢 Green Line = Live Distance | Ola/Uber Style Tracker
            </div>
        </div>
    </div>

    <script>
        // ============================================
        // RIDE STYLE TRACKER - OLA/UBER LIKE SYSTEM
        // User A shares location, User B enters code
        // Both see live map with green line and distance
        // ============================================
        
        let map = null;
        let targetMarker = null;      // Green marker (tracked phone)
        let currentMarker = null;     // Blue marker (tracker's phone)
        let routePolyline = null;      // Green line between phones
        let distanceLabelMarker = null; // Distance text on map
        
        let shareWatchId = null;
        let isSharing = false;
        let myCode = null;
        
        let trackingInterval = null;
        let isTracking = false;
        let trackedCode = null;
        
        let myLocation = null;
        let targetLocation = null;
        
        let isMapReady = false;
        
        // Generate 6-digit code
        function generateCode() {
            return Math.floor(100000 + Math.random() * 900000).toString();
        }
        
        // Calculate distance in meters
        function calculateDistance(lat1, lng1, lat2, lng2) {
            const R = 6371e3;
            const φ1 = lat1 * Math.PI / 180;
            const φ2 = lat2 * Math.PI / 180;
            const Δφ = (lat2 - lat1) * Math.PI / 180;
            const Δλ = (lng2 - lng1) * Math.PI / 180;
            const a = Math.sin(Δφ/2) * Math.sin(Δφ/2) +
                      Math.cos(φ1) * Math.cos(φ2) *
                      Math.sin(Δλ/2) * Math.sin(Δλ/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return R * c;
        }
        
        function formatDistance(meters) {
            if (meters < 1000) return Math.round(meters) + ' m';
            return (meters / 1000).toFixed(2) + ' km';
        }
        
        // Initialize Google Map
        function initMap() {
            const defaultCenter = { lat: 28.6139, lng: 77.2090 };
            map = new google.maps.Map(document.getElementById('map'), {
                zoom: 14,
                center: defaultCenter,
                zoomControl: true,
                streetViewControl: false,
                mapTypeControl: false,
                fullscreenControl: true,
                styles: [
                    { elementType: "geometry", stylers: [{ color: "#1a1a2e" }] },
                    { elementType: "labels.text.fill", stylers: [{ color: "#8ab4f8" }] },
                    { featureType: "road", elementType: "geometry", stylers: [{ color: "#2d2d4a" }] },
                    { featureType: "road.highway", elementType: "geometry", stylers: [{ color: "#3a3a5a" }] },
                    { featureType: "water", elementType: "geometry", stylers: [{ color: "#0a1a3a" }] },
                    { featureType: "transit", elementType: "geometry", stylers: [{ color: "#2a2a4a" }] }
                ]
            });
            
            // Target Marker (Green - Phone being tracked)
            targetMarker = new google.maps.Marker({
                position: defaultCenter,
                map: map,
                icon: {
                    url: "http://maps.google.com/mapfiles/ms/icons/green-dot.png",
                    scaledSize: new google.maps.Size(48, 48)
                },
                title: "📍 Target Phone (Green)",
                animation: google.maps.Animation.DROP
            });
            
            // Current Marker (Blue - Your phone)
            currentMarker = new google.maps.Marker({
                position: defaultCenter,
                map: map,
                icon: {
                    url: "http://maps.google.com/mapfiles/ms/icons/blue-dot.png",
                    scaledSize: new google.maps.Size(48, 48)
                },
                title: "📍 Your Location (Blue)",
                animation: google.maps.Animation.DROP
            });
            
            // Route Polyline (Green line between phones)
            routePolyline = new google.maps.Polyline({
                path: [],
                geodesic: true,
                strokeColor: "#00ff88",
                strokeOpacity: 0.9,
                strokeWeight: 5,
                icons: [{
                    icon: {
                        path: google.maps.SymbolPath.FORWARD_CLOSED_ARROW,
                        scale: 4,
                        strokeColor: "#00ff88",
                        fillColor: "#00ff88",
                        fillOpacity: 1
                    },
                    offset: "50%"
                }]
            });
            routePolyline.setMap(map);
            
            isMapReady = true;
            updateMapDisplay();
        }
        
        // Update map with both locations and draw route
        function updateMapDisplay() {
            if (!isMapReady || !map) return;
            
            let bounds = new google.maps.LatLngBounds();
            let hasPoints = false;
            
            // Update target marker (Green)
            if (targetLocation && targetLocation.lat && targetLocation.lng) {
                const targetPos = new google.maps.LatLng(targetLocation.lat, targetLocation.lng);
                targetMarker.setPosition(targetPos);
                bounds.extend(targetPos);
                hasPoints = true;
            }
            
            // Update current marker (Blue)
            if (myLocation && myLocation.lat && myLocation.lng) {
                const currentPos = new google.maps.LatLng(myLocation.lat, myLocation.lng);
                currentMarker.setPosition(currentPos);
                bounds.extend(currentPos);
                hasPoints = true;
            }
            
            // Draw route line and calculate distance
            if (targetLocation && targetLocation.lat && myLocation && myLocation.lat) {
                const path = [
                    new google.maps.LatLng(myLocation.lat, myLocation.lng),
                    new google.maps.LatLng(targetLocation.lat, targetLocation.lng)
                ];
                routePolyline.setPath(path);
                
                const distanceMeters = calculateDistance(
                    myLocation.lat, myLocation.lng,
                    targetLocation.lat, targetLocation.lng
                );
                
                document.getElementById('distanceValue').innerHTML = formatDistance(distanceMeters);
                document.getElementById('distanceCard').style.display = 'block';
                
                // Add distance label at midpoint
                const midLat = (myLocation.lat + targetLocation.lat) / 2;
                const midLng = (myLocation.lng + targetLocation.lng) / 2;
                
                if (distanceLabelMarker) distanceLabelMarker.setMap(null);
                distanceLabelMarker = new google.maps.Marker({
                    position: { lat: midLat, lng: midLng },
                    map: map,
                    icon: {
                        path: google.maps.SymbolPath.CIRCLE,
                        scale: 0,
                        fillOpacity: 0
                    },
                    label: {
                        text: `📏 ${formatDistance(distanceMeters)}`,
                        color: "#00ff88",
                        fontWeight: "bold",
                        fontSize: "13px",
                        className: "distance-label-map"
                    }
                });
            } else {
                routePolyline.setPath([]);
                if (distanceLabelMarker) distanceLabelMarker.setMap(null);
            }
            
            if (hasPoints) {
                map.fitBounds(bounds);
                const zoomLevel = map.getZoom();
                if (zoomLevel > 18) map.setZoom(18);
                if (zoomLevel < 12) map.setZoom(14);
            }
        }
        
        // ========== USER A: SHARE MY LOCATION (Target Phone) ==========
        function startSharingLocation() {
            if (!navigator.geolocation) {
                alert("Geolocation not supported on this device");
                return false;
            }
            
            document.getElementById('shareDot').classList.add('live');
            document.getElementById('shareStatus').innerHTML = '📍 Sharing live location...';
            document.getElementById('shareRideBadge').style.display = 'inline-block';
            document.getElementById('startShareBtn').style.display = 'none';
            document.getElementById('stopShareBtn').style.display = 'block';
            
            shareWatchId = navigator.geolocation.watchPosition(
                (position) => {
                    const lat = position.coords.latitude;
                    const lng = position.coords.longitude;
                    const accuracy = position.coords.accuracy;
                    const timestamp = new Date().toLocaleTimeString();
                    
                    // Save to localStorage
                    const locationData = {
                        lat: lat,
                        lng: lng,
                        accuracy: accuracy,
                        timestamp: timestamp,
                        lastUpdate: Date.now()
                    };
                    
                    localStorage.setItem('ride_location_' + myCode, JSON.stringify(locationData));
                    localStorage.setItem('ride_sharing_active', 'true');
                    localStorage.setItem('ride_active_code', myCode);
                    
                    // Update own location in map (if this device is also tracking)
                    myLocation = { lat: lat, lng: lng };
                    updateMapDisplay();
                    
                    document.getElementById('shareLocation').innerHTML = 
                        `📍 ${lat.toFixed(6)}, ${lng.toFixed(6)}<br>🕐 ${timestamp} | ±${Math.round(accuracy)}m`;
                },
                (error) => {
                    let msg = "Location error";
                    if (error.code === 1) msg = "❌ Permission denied. Enable location.";
                    if (error.code === 2) msg = "❌ Position unavailable.";
                    if (error.code === 3) msg = "❌ Timeout. Check GPS.";
                    document.getElementById('shareStatus').innerHTML = msg;
                    document.getElementById('shareDot').classList.remove('live');
                },
                { enableHighAccuracy: true, timeout: 8000, maximumAge: 0 }
            );
            
            isSharing = true;
            return true;
        }
        
        function stopSharingLocation() {
            if (shareWatchId) {
                navigator.geolocation.clearWatch(shareWatchId);
                shareWatchId = null;
            }
            isSharing = false;
            localStorage.setItem('ride_sharing_active', 'false');
            localStorage.removeItem('ride_location_' + myCode);
            
            document.getElementById('shareDot').classList.remove('live');
            document.getElementById('shareStatus').innerHTML = '❌ Sharing stopped';
            document.getElementById('shareRideBadge').style.display = 'none';
            document.getElementById('shareLocation').innerHTML = '-';
            document.getElementById('startShareBtn').style.display = 'block';
            document.getElementById('stopShareBtn').style.display = 'none';
        }
        
        // ========== USER B: GET MY OWN LOCATION ==========
        function startGettingMyLocation() {
            if (!navigator.geolocation) return;
            
            navigator.geolocation.watchPosition(
                (position) => {
                    myLocation = {
                        lat: position.coords.latitude,
                        lng: position.coords.longitude
                    };
                    document.getElementById('trackLocation').innerHTML = 
                        `📍 Your location: ${myLocation.lat.toFixed(6)}, ${myLocation.lng.toFixed(6)}`;
                    
                    if (isTracking && isMapReady) {
                        updateMapDisplay();
                    }
                },
                (error) => {
                    console.log("Error getting location:", error);
                },
                { enableHighAccuracy: true, maximumAge: 5000 }
            );
        }
        
        // ========== USER B: TRACK OTHER PHONE ==========
        function startTrackingPhone(code) {
            if (!code || code.length !== 6) {
                alert("Please enter a valid 6-digit code");
                return false;
            }
            
            const savedCode = localStorage.getItem('ride_active_code');
            const sharingActive = localStorage.getItem('ride_sharing_active');
            
            if (savedCode !== code) {
                alert("❌ Invalid code! Make sure the other phone is sharing location.");
                return false;
            }
            
            if (sharingActive !== 'true') {
                alert("⚠️ The target phone is not sharing location right now.");
                return false;
            }
            
            if (trackingInterval) clearInterval(trackingInterval);
            
            isTracking = true;
            trackedCode = code;
            localStorage.setItem('ride_tracking_code', code);
            
            document.getElementById('trackDot').classList.add('live');
            document.getElementById('trackStatus').innerHTML = `🟢 Live tracking Phone with code ${code}...`;
            document.getElementById('stopTrackBtn').style.display = 'block';
            document.getElementById('trackBtn').style.display = 'none';
            document.getElementById('distanceCard').style.display = 'block';
            
            // Fetch target location every 2 seconds
            trackingInterval = setInterval(() => {
                if (isTracking && trackedCode) {
                    const locationStr = localStorage.getItem('ride_location_' + trackedCode);
                    if (locationStr) {
                        try {
                            const locationData = JSON.parse(locationStr);
                            const now = Date.now();
                            if (now - locationData.lastUpdate < 15000) {
                                targetLocation = {
                                    lat: locationData.lat,
                                    lng: locationData.lng
                                };
                                document.getElementById('trackStatus').innerHTML = 
                                    `🟢 Live tracking · Updated: ${locationData.timestamp || 'now'}`;
                                if (isMapReady) updateMapDisplay();
                            } else {
                                document.getElementById('trackStatus').innerHTML = `⚠️ Waiting for target phone location...`;
                            }
                        } catch(e) {}
                    }
                }
            }, 2000);
            
            return true;
        }
        
        function stopTrackingPhone() {
            if (trackingInterval) {
                clearInterval(trackingInterval);
                trackingInterval = null;
            }
            isTracking = false;
            trackedCode = null;
            targetLocation = null;
            localStorage.removeItem('ride_tracking_code');
            
            document.getElementById('trackDot').classList.remove('live');
            document.getElementById('trackStatus').innerHTML = 'Not tracking. Enter code.';
            document.getElementById('trackLocation').innerHTML = '';
            document.getElementById('stopTrackBtn').style.display = 'none';
            document.getElementById('trackBtn').style.display = 'block';
            document.getElementById('distanceCard').style.display = 'none';
            document.getElementById('targetCode').value = '';
            
            if (routePolyline) routePolyline.setPath([]);
            if (distanceLabelMarker) distanceLabelMarker.setMap(null);
        }
        
        // ========== TAB SWITCHING ==========
        function switchTab(tabName) {
            const shareTab = document.getElementById('shareTab');
            const trackTab = document.getElementById('trackTab');
            const tabs = document.querySelectorAll('.tab');
            
            tabs.forEach(tab => tab.classList.remove('active'));
            
            if (tabName === 'share') {
                shareTab.style.display = 'block';
                trackTab.style.display = 'none';
                tabs[0].classList.add('active');
            } else {
                shareTab.style.display = 'none';
                trackTab.style.display = 'block';
                tabs[1].classList.add('active');
            }
        }
        
        // ========== EVENT LISTENERS ==========
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                const tabType = tab.getAttribute('data-tab');
                switchTab(tabType);
            });
        });
        
        document.getElementById('copyCodeBtn').addEventListener('click', () => {
            const code = document.getElementById('myCode').innerText;
            navigator.clipboard.writeText(code).then(() => {
                alert('✓ Code copied: ' + code);
            }).catch(() => {
                prompt('Copy this code:', code);
            });
        });
        
        document.getElementById('startShareBtn').addEventListener('click', startSharingLocation);
        document.getElementById('stopShareBtn').addEventListener('click', stopSharingLocation);
        
        document.getElementById('trackBtn').addEventListener('click', () => {
            const code = document.getElementById('targetCode').value.trim();
            if (code) startTrackingPhone(code);
            else alert("Enter the 6-digit code from the other phone");
        });
        
        document.getElementById('stopTrackBtn').addEventListener('click', stopTrackingPhone);
        
        document.getElementById('targetCode').addEventListener('input', (e) => {
            e.target.value = e.target.value.replace(/[^0-9]/g, '').slice(0, 6);
        });
        
        // ========== INITIALIZE ==========
        myCode = generateCode();
        document.getElementById('myCode').innerText = myCode;
        localStorage.setItem('ride_active_code', myCode);
        
        // Check for existing sharing session
        if (localStorage.getItem('ride_sharing_active') === 'true') {
            startSharingLocation();
        }
        
        // Check for existing tracking session
        const savedTrackingCode = localStorage.getItem('ride_tracking_code');
        if (savedTrackingCode) {
            document.getElementById('targetCode').value = savedTrackingCode;
            setTimeout(() => startTrackingPhone(savedTrackingCode), 500);
        }
        
        // Start getting own location
        startGettingMyLocation();
        
        // Google Maps callback
        window.initMap = initMap;
        
        // Auto-refresh map every second
        setInterval(() => {
            if (isMapReady) updateMapDisplay();
        }, 1000);
        
        // Cross-tab sync for real-time updates
        window.addEventListener('storage', (e) => {
            if (e.key === 'ride_location_' + trackedCode && isTracking) {
                const locationStr = e.newValue;
                if (locationStr) {
                    try {
                        const data = JSON.parse(locationStr);
                        targetLocation = { lat: data.lat, lng: data.lng };
                        updateMapDisplay();
                    } catch(e) {}
                }
            }
        });
    </script>
    
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyB41DRUbKWJHPxaFjMAwdrzWzbVKartNGg&callback=initMap" async defer></script>
</body>
</html>
