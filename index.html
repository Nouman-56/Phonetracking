<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>Live Ride Tracker · Real-Time Location Sharing</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #0a0a0f;
            min-height: 100vh;
            color: #ffffff;
        }

        .app-container {
            max-width: 100%;
            margin: 0 auto;
        }

        .map-full {
            width: 100%;
            height: 58vh;
            position: relative;
            background: #0f172a;
        }

        #map {
            width: 100%;
            height: 100%;
            background: #0f172a;
        }

        .info-overlay {
            position: absolute;
            top: 20px;
            left: 12px;
            right: 12px;
            z-index: 1000;
            pointer-events: none;
        }

        .distance-card {
            background: linear-gradient(135deg, rgba(0, 0, 0, 0.9) 0%, rgba(20, 30, 50, 0.95) 100%);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 14px 20px;
            text-align: center;
            border: 1px solid rgba(0, 255, 136, 0.5);
            box-shadow: 0 8px 32px rgba(0, 255, 136, 0.15);
            pointer-events: auto;
        }

        .distance-value {
            font-size: 2rem;
            font-weight: bold;
            color: #00ff88;
            font-family: monospace;
        }

        .distance-label {
            font-size: 0.7rem;
            opacity: 0.8;
        }

        .bottom-panel {
            background: #0f1322;
            border-radius: 32px 32px 0 0;
            padding: 20px;
            margin-top: -20px;
            position: relative;
            z-index: 20;
            box-shadow: 0 -8px 32px rgba(0, 0, 0, 0.4);
        }

        .tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            background: #1a1f2e;
            padding: 6px;
            border-radius: 60px;
        }

        .tab {
            flex: 1;
            text-align: center;
            padding: 12px;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            color: #8899aa;
            font-size: 0.9rem;
        }

        .tab.active {
            background: linear-gradient(135deg, #00ff88, #00ccff);
            color: #000;
        }

        .code-section {
            background: #151a2a;
            border-radius: 28px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .code-display {
            background: #0a0e18;
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            border: 2px solid #00ff88;
        }

        .code-number {
            font-size: 2.3rem;
            font-family: 'Courier New', monospace;
            letter-spacing: 8px;
            font-weight: bold;
            color: #00ff88;
        }

        .copy-btn {
            background: #00ff88;
            color: #000;
            border: none;
            padding: 10px 24px;
            border-radius: 40px;
            font-weight: bold;
            margin-top: 12px;
            cursor: pointer;
        }

        .input-group {
            display: flex;
            gap: 12px;
            margin-top: 15px;
            flex-wrap: wrap;
        }

        .input-group input {
            flex: 1;
            background: #0a0e18;
            border: 1px solid #00ccff;
            padding: 14px;
            border-radius: 60px;
            color: white;
            font-size: 1.2rem;
            text-align: center;
            letter-spacing: 4px;
            font-family: monospace;
            outline: none;
        }

        .track-btn {
            background: linear-gradient(135deg, #00ff88, #00ccff);
            border: none;
            padding: 14px 28px;
            border-radius: 60px;
            color: #000;
            font-weight: bold;
            cursor: pointer;
        }

        .status-card {
            background: #0a0e18;
            border-radius: 24px;
            padding: 16px;
            margin-top: 15px;
        }

        .status-row {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .status-dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #555;
        }

        .status-dot.live {
            background: #00ff88;
            box-shadow: 0 0 10px #00ff88;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .location-text {
            font-size: 0.7rem;
            color: #aaaaff;
            margin-top: 8px;
            word-break: break-all;
        }

        .btn-stop {
            background: #ff4444;
            width: 100%;
            padding: 14px;
            border-radius: 60px;
            border: none;
            color: white;
            font-weight: bold;
            margin-top: 15px;
            cursor: pointer;
        }

        .btn-start {
            background: #00ff88;
            color: #000;
            width: 100%;
            padding: 14px;
            border-radius: 60px;
            border: none;
            font-weight: bold;
            margin-top: 0;
            cursor: pointer;
        }

        .footer {
            text-align: center;
            font-size: 0.6rem;
            opacity: 0.5;
            padding: 16px;
        }

        .ride-badge {
            display: inline-block;
            background: #00ff8822;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            margin-left: 10px;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="map-full">
            <div id="map"></div>
        </div>

        <div class="info-overlay">
            <div class="distance-card" id="distanceCard" style="display: none;">
                <div class="distance-label">🚗 DISTANCE BETWEEN DEVICES</div>
                <div class="distance-value" id="distanceValue">0 m</div>
                <div class="distance-label">🟢 Green Line = Live Route</div>
            </div>
        </div>

        <div class="bottom-panel">
            <div class="tabs">
                <div class="tab active" data-tab="share">📱 My Phone · Share Location</div>
                <div class="tab" data-tab="track">🎯 Track Other Phone</div>
            </div>

            <div id="shareTab">
                <div class="code-section">
                    <div class="code-display">
                        <div style="font-size: 0.7rem; opacity: 0.7;">🔐 YOUR SHARING CODE</div>
                        <div class="code-number" id="myCode">------</div>
                        <button class="copy-btn" id="copyCodeBtn">📋 Copy Code</button>
                    </div>
                    
                    <div class="input-group" style="margin-top: 20px;">
                        <input type="text" id="shareTrackCode" placeholder="Enter Other Phone's 6-digit Code" maxlength="6">
                        <button class="track-btn" id="shareTrackBtn">🔗 Link & Track Both</button>
                    </div>
                    
                    <div class="status-card">
                        <div class="status-row">
                            <div class="status-dot" id="shareDot"></div>
                            <span id="shareStatus">📍 Not sharing</span>
                            <span class="ride-badge" id="shareRideBadge" style="display: none;">🔴 SHARING LIVE</span>
                        </div>
                        <div class="location-text" id="shareLocation">-</div>
                    </div>
                    <button class="btn-stop" id="stopShareBtn" style="display: none;">🛑 Stop Sharing</button>
                    <button class="btn-start" id="startShareBtn">▶ Start Sharing Location</button>
                </div>
            </div>

            <div id="trackTab" style="display: none;">
                <div class="code-section">
                    <div class="input-group">
                        <input type="text" id="targetCode" placeholder="Enter Other Phone's 6-digit Code" maxlength="6">
                        <button class="track-btn" id="trackBtn">🔍 Start Tracking</button>
                    </div>
                    <div class="status-card">
                        <div class="status-row">
                            <div class="status-dot" id="trackDot"></div>
                            <span id="trackStatus">Ready · Enter code to track</span>
                        </div>
                        <div class="location-text" id="trackLocation">-</div>
                    </div>
                    <button class="btn-stop" id="stopTrackBtn" style="display: none;">⛔ Stop Tracking</button>
                </div>
            </div>

            <div class="footer">
                🔴 <strong style="color:#ff6666">RED Dot</strong> = Your Phone &nbsp;&nbsp;|&nbsp;&nbsp;
                🔵 <strong style="color:#66aaff">BLUE Dot</strong> = Other Phone &nbsp;&nbsp;|&nbsp;&nbsp;
                🟢 <strong style="color:#00ff88">Green Line</strong> = Distance Path
            </div>
        </div>
    </div>

    <script>
        // ============================================
        // COMPLETE WORKING LOCATION TRACKER
        // Code valid, real-time update, distance show
        // ============================================
        
        let map = null;
        let myMarker = null;
        let otherMarker = null;
        let routeLine = null;
        
        let watchId = null;
        let myCode = null;
        let isSharing = false;
        
        let trackingInterval = null;
        let isTracking = false;
        let trackingCode = null;
        
        let twoWayInterval = null;
        let isTwoWay = false;
        
        let myLocation = null;
        let otherLocation = null;
        
        let mapReady = false;
        let mapCentered = false;
        
        let deviceId = localStorage.getItem('tracker_device_id');
        if (!deviceId) {
            deviceId = 'dev_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6);
            localStorage.setItem('tracker_device_id', deviceId);
        }
        
        // Get or create permanent code
        function getPermanentCode() {
            let code = localStorage.getItem('tracker_my_code');
            if (!code) {
                code = Math.floor(100000 + Math.random() * 900000).toString();
                localStorage.setItem('tracker_my_code', code);
            }
            return code;
        }
        
        function calculateDistance(lat1, lng1, lat2, lng2) {
            if (!lat1 || !lng1 || !lat2 || !lng2) return 0;
            const R = 6371e3;
            const φ1 = lat1 * Math.PI / 180;
            const φ2 = lat2 * Math.PI / 180;
            const Δφ = (lat2 - lat1) * Math.PI / 180;
            const Δλ = (lng2 - lng1) * Math.PI / 180;
            const a = Math.sin(Δφ/2) * Math.sin(Δφ/2) +
                      Math.cos(φ1) * Math.cos(φ2) *
                      Math.sin(Δλ/2) * Math.sin(Δλ/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return R * c;
        }
        
        function formatDistance(m) {
            return m < 1000 ? Math.round(m) + ' m' : (m/1000).toFixed(2) + ' km';
        }
        
        function initMap() {
            map = L.map('map').setView([20, 0], 2);
            
            L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
                attribution: '© OpenStreetMap',
                subdomains: 'abcd',
                maxZoom: 20
            }).addTo(map);
            
            const redIcon = L.divIcon({
                html: `<div style="background:#ff3333; width:32px; height:32px; border-radius:50%; border:3px solid white; box-shadow:0 0 15px #ff3333; animation:pulseRed 1s infinite;"></div>
                       <div style="background:#000; padding:2px 8px; border-radius:16px; font-size:10px; margin-top:35px; text-align:center; white-space:nowrap;">📍 YOUR PHONE</div>`,
                iconSize: [50, 70],
                popupAnchor: [0, -35]
            });
            
            const blueIcon = L.divIcon({
                html: `<div style="background:#3399ff; width:32px; height:32px; border-radius:50%; border:3px solid white; box-shadow:0 0 15px #3399ff; animation:pulseBlue 1s infinite;"></div>
                       <div style="background:#000; padding:2px 8px; border-radius:16px; font-size:10px; margin-top:35px; text-align:center; white-space:nowrap;">📍 OTHER PHONE</div>`,
                iconSize: [50, 70],
                popupAnchor: [0, -35]
            });
            
            const style = document.createElement('style');
            style.textContent = `
                @keyframes pulseRed { 0%,100% { box-shadow:0 0 0 0 rgba(255,51,51,0.7); } 50% { box-shadow:0 0 0 15px rgba(255,51,51,0); } }
                @keyframes pulseBlue { 0%,100% { box-shadow:0 0 0 0 rgba(51,153,255,0.7); } 50% { box-shadow:0 0 0 15px rgba(51,153,255,0); } }
            `;
            document.head.appendChild(style);
            
            myMarker = L.marker([0, 0], { icon: redIcon }).addTo(map);
            otherMarker = L.marker([0, 0], { icon: blueIcon }).addTo(map);
            routeLine = L.polyline([], { color: '#00ff88', weight: 5, opacity: 0.9 }).addTo(map);
            
            mapReady = true;
            updateMap();
        }
        
        function updateMap() {
            if (!mapReady || !map) return;
            
            if (myLocation && myLocation.lat) {
                myMarker.setLatLng([myLocation.lat, myLocation.lng]);
            }
            if (otherLocation && otherLocation.lat) {
                otherMarker.setLatLng([otherLocation.lat, otherLocation.lng]);
            }
            
            if (myLocation && myLocation.lat && otherLocation && otherLocation.lat) {
                routeLine.setLatLngs([[myLocation.lat, myLocation.lng], [otherLocation.lat, otherLocation.lng]]);
                const dist = calculateDistance(myLocation.lat, myLocation.lng, otherLocation.lat, otherLocation.lng);
                document.getElementById('distanceValue').innerHTML = formatDistance(dist);
                document.getElementById('distanceCard').style.display = 'block';
            } else {
                routeLine.setLatLngs([]);
                document.getElementById('distanceCard').style.display = 'none';
            }
            
            if (!mapCentered && myLocation && myLocation.lat) {
                map.setView([myLocation.lat, myLocation.lng], 14);
                mapCentered = true;
            } else if (!mapCentered && myLocation && otherLocation && otherLocation.lat) {
                let bounds = L.latLngBounds();
                bounds.extend([myLocation.lat, myLocation.lng]);
                bounds.extend([otherLocation.lat, otherLocation.lng]);
                map.fitBounds(bounds, { padding: [50, 50] });
                mapCentered = true;
            }
        }
        
        // Save my location to storage
        function saveMyLocation(lat, lng, accuracy) {
            const data = {
                lat: lat,
                lng: lng,
                accuracy: accuracy,
                timestamp: new Date().toLocaleTimeString(),
                lastUpdate: Date.now()
            };
            localStorage.setItem('tracker_location_' + myCode, JSON.stringify(data));
            localStorage.setItem('tracker_active_' + myCode, 'true');
            localStorage.setItem('tracker_device_' + myCode, deviceId);
        }
        
        function startSharing() {
            if (!navigator.geolocation) {
                alert("Geolocation not supported");
                return;
            }
            
            document.getElementById('shareDot').classList.add('live');
            document.getElementById('shareStatus').innerHTML = '🔴 Sharing live location...';
            document.getElementById('shareRideBadge').style.display = 'inline-block';
            document.getElementById('startShareBtn').style.display = 'none';
            document.getElementById('stopShareBtn').style.display = 'block';
            
            watchId = navigator.geolocation.watchPosition(
                (pos) => {
                    const lat = pos.coords.latitude;
                    const lng = pos.coords.longitude;
                    const acc = pos.coords.accuracy;
                    
                    myLocation = { lat: lat, lng: lng, accuracy: acc };
                    saveMyLocation(lat, lng, acc);
                    updateMap();
                    
                    document.getElementById('shareLocation').innerHTML = 
                        `📍 Your location: ${lat.toFixed(6)}, ${lng.toFixed(6)}<br>🕐 ${new Date().toLocaleTimeString()} | ±${Math.round(acc)}m`;
                },
                (err) => {
                    let msg = "Location error";
                    if (err.code === 1) msg = "❌ Permission denied";
                    if (err.code === 2) msg = "❌ Position unavailable";
                    if (err.code === 3) msg = "❌ GPS timeout";
                    document.getElementById('shareStatus').innerHTML = msg;
                    document.getElementById('shareDot').classList.remove('live');
                },
                { enableHighAccuracy: true, timeout: 8000, maximumAge: 0 }
            );
            
            isSharing = true;
        }
        
        function stopSharing() {
            if (watchId) {
                navigator.geolocation.clearWatch(watchId);
                watchId = null;
            }
            isSharing = false;
            localStorage.setItem('tracker_active_' + myCode, 'false');
            localStorage.removeItem('tracker_location_' + myCode);
            
            document.getElementById('shareDot').classList.remove('live');
            document.getElementById('shareStatus').innerHTML = '❌ Sharing stopped';
            document.getElementById('shareRideBadge').style.display = 'none';
            document.getElementById('shareLocation').innerHTML = '-';
            document.getElementById('startShareBtn').style.display = 'block';
            document.getElementById('stopShareBtn').style.display = 'none';
            
            if (twoWayInterval) clearInterval(twoWayInterval);
            isTwoWay = false;
            otherLocation = null;
            updateMap();
        }
        
        // Two-way tracking (track other phone)
        function startTwoWayTracking(otherCode) {
            if (!otherCode || otherCode.length !== 6) {
                alert("Please enter 6-digit code");
                return false;
            }
            
            if (twoWayInterval) clearInterval(twoWayInterval);
            
            isTwoWay = true;
            localStorage.setItem('tracker_two_way_code', otherCode);
            document.getElementById('shareStatus').innerHTML = '🔴 Sharing + Tracking other phone...';
            
            twoWayInterval = setInterval(() => {
                if (isTwoWay && otherCode) {
                    const dataStr = localStorage.getItem('tracker_location_' + otherCode);
                    if (dataStr) {
                        try {
                            const data = JSON.parse(dataStr);
                            const now = Date.now();
                            if (now - data.lastUpdate < 15000) {
                                otherLocation = { lat: data.lat, lng: data.lng, accuracy: data.accuracy };
                                updateMap();
                            }
                        } catch(e) {}
                    }
                }
            }, 2000);
            
            alert("✓ Both devices linked! Green route line will show on map.");
            return true;
        }
        
        // Track other phone (Phone B)
        function startTracking(code) {
            if (!code || code.length !== 6) {
                alert("Please enter 6-digit code");
                return false;
            }
            
            const isActive = localStorage.getItem('tracker_active_' + code);
            if (isActive !== 'true') {
                alert("❌ Invalid code or other phone is not sharing location. Make sure the other phone has started sharing.");
                return false;
            }
            
            if (trackingInterval) clearInterval(trackingInterval);
            
            isTracking = true;
            trackingCode = code;
            localStorage.setItem('tracker_tracking_code', code);
            mapCentered = false;
            
            document.getElementById('trackDot').classList.add('live');
            document.getElementById('trackStatus').innerHTML = `🟢 Tracking live (${code})...`;
            document.getElementById('stopTrackBtn').style.display = 'block';
            document.getElementById('trackBtn').style.display = 'none';
            document.getElementById('distanceCard').style.display = 'block';
            
            trackingInterval = setInterval(() => {
                if (isTracking && trackingCode) {
                    const dataStr = localStorage.getItem('tracker_location_' + trackingCode);
                    if (dataStr) {
                        try {
                            const data = JSON.parse(dataStr);
                            const now = Date.now();
                            if (now - data.lastUpdate < 15000) {
                                otherLocation = { lat: data.lat, lng: data.lng, accuracy: data.accuracy };
                                document.getElementById('trackStatus').innerHTML = `🟢 Live tracking · Updated: ${data.timestamp || 'now'}`;
                                updateMap();
                            } else {
                                document.getElementById('trackStatus').innerHTML = `⚠️ Waiting for other phone...`;
                            }
                        } catch(e) {}
                    }
                }
            }, 2000);
            
            alert("✓ Now tracking! Distance and route will appear on map.");
            return true;
        }
        
        function stopTracking() {
            if (trackingInterval) {
                clearInterval(trackingInterval);
                trackingInterval = null;
            }
            isTracking = false;
            trackingCode = null;
            otherLocation = null;
            localStorage.removeItem('tracker_tracking_code');
            
            document.getElementById('trackDot').classList.remove('live');
            document.getElementById('trackStatus').innerHTML = 'Ready · Enter code to track';
            document.getElementById('trackLocation').innerHTML = '';
            document.getElementById('stopTrackBtn').style.display = 'none';
            document.getElementById('trackBtn').style.display = 'block';
            document.getElementById('distanceCard').style.display = 'none';
            document.getElementById('targetCode').value = '';
            
            routeLine.setLatLngs([]);
            updateMap();
            mapCentered = false;
        }
        
        // Get my own location (for Phone B)
        function getMyLocation() {
            if (!navigator.geolocation) return;
            
            navigator.geolocation.watchPosition(
                (pos) => {
                    myLocation = {
                        lat: pos.coords.latitude,
                        lng: pos.coords.longitude,
                        accuracy: pos.coords.accuracy
                    };
                    document.getElementById('trackLocation').innerHTML = 
                        `📍 Your location: ${myLocation.lat.toFixed(6)}, ${myLocation.lng.toFixed(6)}`;
                    
                    if (isTracking && mapReady) updateMap();
                },
                (err) => console.log("Location error:", err),
                { enableHighAccuracy: true, maximumAge: 5000 }
            );
        }
        
        function switchTab(name) {
            const shareTab = document.getElementById('shareTab');
            const trackTab = document.getElementById('trackTab');
            const tabs = document.querySelectorAll('.tab');
            
            tabs.forEach(t => t.classList.remove('active'));
            
            if (name === 'share') {
                shareTab.style.display = 'block';
                trackTab.style.display = 'none';
                tabs[0].classList.add('active');
            } else {
                shareTab.style.display = 'none';
                trackTab.style.display = 'block';
                tabs[1].classList.add('active');
            }
        }
        
        // Event listeners
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => switchTab(tab.dataset.tab));
        });
        
        document.getElementById('copyCodeBtn').addEventListener('click', () => {
            const code = document.getElementById('myCode').innerText;
            navigator.clipboard.writeText(code).then(() => alert('✓ Code copied: ' + code));
        });
        
        document.getElementById('startShareBtn').addEventListener('click', startSharing);
        document.getElementById('stopShareBtn').addEventListener('click', stopSharing);
        
        document.getElementById('shareTrackBtn').addEventListener('click', () => {
            const code = document.getElementById('shareTrackCode').value.trim();
            if (code) {
                startTwoWayTracking(code);
                document.getElementById('shareTrackCode').value = '';
            } else {
                alert("Enter other phone's 6-digit code");
            }
        });
        
        document.getElementById('trackBtn').addEventListener('click', () => {
            const code = document.getElementById('targetCode').value.trim();
            if (code) startTracking(code);
            else alert("Enter other phone's 6-digit code");
        });
        
        document.getElementById('stopTrackBtn').addEventListener('click', stopTracking);
        
        document.getElementById('targetCode').addEventListener('input', (e) => {
            e.target.value = e.target.value.replace(/[^0-9]/g, '').slice(0, 6);
        });
        document.getElementById('shareTrackCode').addEventListener('input', (e) => {
            e.target.value = e.target.value.replace(/[^0-9]/g, '').slice(0, 6);
        });
        
        // Initialize
        myCode = getPermanentCode();
        document.getElementById('myCode').innerText = myCode;
        localStorage.setItem('tracker_device_' + myCode, deviceId);
        
        // Restore states
        if (localStorage.getItem('tracker_active_' + myCode) === 'true') {
            startSharing();
        }
        
        const savedTwoWay = localStorage.getItem('tracker_two_way_code');
        if (savedTwoWay) {
            document.getElementById('shareTrackCode').value = savedTwoWay;
            setTimeout(() => startTwoWayTracking(savedTwoWay), 500);
        }
        
        const savedTracking = localStorage.getItem('tracker_tracking_code');
        if (savedTracking) {
            document.getElementById('targetCode').value = savedTracking;
            setTimeout(() => startTracking(savedTracking), 500);
        }
        
        getMyLocation();
        initMap();
        
        setInterval(() => {
            if (mapReady) updateMap();
        }, 1000);
        
        // Cross-tab sync
        window.addEventListener('storage', (e) => {
            if (e.key === 'tracker_location_' + trackingCode && isTracking) {
                try {
                    const data = JSON.parse(e.newValue);
                    if (data) otherLocation = { lat: data.lat, lng: data.lng, accuracy: data.accuracy };
                    updateMap();
                } catch(e) {}
            }
            if (e.key === 'tracker_location_' + (localStorage.getItem('tracker_two_way_code')) && isTwoWay) {
                try {
                    const data = JSON.parse(e.newValue);
                    if (data) otherLocation = { lat: data.lat, lng: data.lng, accuracy: data.accuracy };
                    updateMap();
                } catch(e) {}
            }
        });
        
        console.log("✅ Tracker Ready! Code:", myCode);
    </script>
</body>
</html>
